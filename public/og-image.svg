    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left content -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#64748b">居家口腔健康AI初筛</text>

  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#1e293b">智能识别口腔问题</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#1e293b">守护您的牙齿健康</text>

  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b">拍照即测 · AI分析 · 即时报告</text>

  <!-- CTA Button -->
  <rect x="80" y="480" width="180" height="56" rx="12" fill="url(#accent)"/>
  <text x="170" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">免费开始检测</text>

